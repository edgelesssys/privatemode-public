            - '--max-num-seqs=128'
            - '--max-model-len=262144'
            - '--enable-auto-tool-choice'
            - '--tool-call-parser'
            - 'gemma4'
            - '--reasoning-parser'
            - 'gemma4'
            - '--structured-outputs-config={"backend": "xgrammar", "disable_any_whitespace": true}'
            - '--no-enable-prefix-caching'
            - '--default-chat-template-kwargs'
            - '{"enable_thinking": true}'
            - '--served-model-name'
            - 'gemma-4-31b'
          volumeMounts:
            - name: mount-dir
