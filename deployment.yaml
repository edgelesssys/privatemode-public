          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          args:
            - --gpu-driver-versions=595.58.03
            - --gpu-vbios-versions=97.00.d9.00.35
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
        - name: disk-mounter-gemma4-0
          image: ghcr.io/edgelesssys/privatemode/disk-mounter:v1.40.0@sha256:c732885dd2d50969fc763d31c9563ad8f07411813d4d53e00aa0567c400e783f
          args:
            - 'gemma4'
            - '0'
            - 'e60b3dbcd95c026297db0ec524c8578048d142653c2d68e20c2ec1c45f74ee6c'
          restartPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: mount-dir
              mountPath: /mnt
              mountPropagation: Bidirectional
          volumeDevices:
            - name: modelweights-gemma4-0
              devicePath: /dev/modelweights-gemma4-0
      containers:
        - name: workload-gemma4-0
          image: docker.io/vllm/vllm-openai:v0.20.0@sha256:04563c302537a91aa49ebdfbceda96111c5712275999b7e8804fa598f0b5641d
