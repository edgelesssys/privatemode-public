      app: workload-gemma4
  template:
    metadata:
      labels:
        app: workload-gemma4
        app.kubernetes.io/instance: '347e1b'
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
    spec:
      serviceAccountName: workload-gemma4-sa
      runtimeClassName: contrast-cc-metal-qemu-tdx-gpu
      initContainers:
        - name: attestation-agent
