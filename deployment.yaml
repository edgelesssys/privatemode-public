            - containerPort: 8185
          args:
            - '--adapter-type=openai,anthropic'
            - '--workload-address=127.0.0.1'
            - '--listen-port=8085'
            - '--metrics-port=8185'
            - '--workload-port=8000'
            - '--secret-svc-address=secret-service-internal.continuum-68e571.svc.cluster.local'
            - '--etcd-member-cert=/contrast/tls-config/certChain.pem'
            - '--etcd-member-key=/contrast/tls-config/key.pem'
            - '--etcd-ca=/contrast/tls-config/mesh-ca.pem'
            - '--workload-tasks=transcribe'
          volumeMounts:
            - name: inference-proxy-voxtralmini-0-tls-cert
              mountPath: /etc/tls
              readOnly: true
            - name: continuum-run
