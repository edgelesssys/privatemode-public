        app: workload-gptoss
        app.kubernetes.io/instance: '68e571'
        privatemode.edgeless.systems/needs-gpu: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
    spec:
      serviceAccountName: workload-gptoss-sa
      runtimeClassName: contrast-cc
      initContainers:
        - name: attestation-agent
          volumeMounts:
            - name: privatemode-ca-cert
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: continuum-run
              mountPath: /var/run/continuum
            - mountPath: /contrast
              name: contrast-secrets
          image: ghcr.io/edgelesssys/privatemode/attestation-agent:v1.35.1@sha256:7e0bf858dad800a582649c9fedf4f374968d3602a86d66d552f82cee3098b71f
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          args:
            - --gpu-driver-versions=590.48.01
            - --gpu-vbios-versions=96.00.88.00.11,96.00.74.00.11,96.00.9F.00.04,96.00.74.00.1C
          securityContext:
            privileged: true
          resources:
            limits:
              "nvidia.com/GH100_H100_PCIE": 1
        - name: disk-mounter-gptoss-0
