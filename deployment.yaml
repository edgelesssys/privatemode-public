apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: secret-service
  namespace: continuum-c79d18
  labels:
    app.kubernetes.io/instance: 'c79d18'
spec:
  replicas: 3
  serviceName: secret-service-headless
  selector:
    matchLabels:
      app: secret-service
  template:
    metadata:
      labels:
        app: secret-service
        app.kubernetes.io/instance: 'c79d18'
    spec:
      runtimeClassName: contrast-cc
      containers:
        - name: secret-service
          image: 'ghcr.io/edgelesssys/privatemode/secret-service:v1.38.0@sha256:532b0ab11b4918896cbc78e8a62864729a0e19daf404730920ca56248ad963ff'
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec /bin/secret-service \
                --k8s-namespace=continuum-c79d18 \
                $([ "${HOSTNAME##*-}" = "0" ] && echo "--may-bootstrap") \
                --etcd-server-cert=/contrast/tls-config/certChain.pem \
                --etcd-server-key=/contrast/tls-config/key.pem \
                --etcd-ca=/contrast/tls-config/mesh-ca.pem
          ports:
            - containerPort: 3000
            - containerPort: 3001
            - containerPort: 9000
            - containerPort: 2379
            - containerPort: 2380
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-gptoss
  namespace: continuum-c79d18
  labels:
    app: workload-gptoss
    app.kubernetes.io/instance: 'c79d18'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-gptoss
  template:
    metadata:
      labels:
        app: workload-gptoss
        app.kubernetes.io/instance: 'c79d18'
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
    spec:
      serviceAccountName: workload-gptoss-sa
      runtimeClassName: contrast-cc-metal-qemu-snp-gpu
      initContainers:
        - name: attestation-agent
          volumeMounts:
            - name: privatemode-ca-cert
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: continuum-run
              mountPath: /var/run/continuum
            - mountPath: /contrast
              name: contrast-secrets
          image: ghcr.io/edgelesssys/privatemode/attestation-agent:v1.38.0@sha256:1625e1833357f9a60276aaf66fc0f514cb528e8023ab0ba4e6b5eff8866596e2
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          args:
            - --gpu-driver-versions=595.58.03
            - --gpu-vbios-versions=96.00.88.00.11,96.00.74.00.11,96.00.9F.00.04,96.00.74.00.1C
          securityContext:
            privileged: true
        - name: disk-mounter-gptoss-0
          image: ghcr.io/edgelesssys/privatemode/disk-mounter:v1.38.0@sha256:689c3f36c74260a8fc82e1c0cd0ebff6c9c44fe78acca4bab9e5e606f5184ee4
          args:
            - 'gptoss'
            - '0'
            - 'a19e31d4c7da198b4905539ac00e55b93f377ecc4048e287810b2cf3a197cb29'
          restartPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: mount-dir
              mountPath: /mnt
              mountPropagation: Bidirectional
          volumeDevices:
            - name: modelweights-gptoss-0
              devicePath: /dev/modelweights-gptoss-0
      containers:
        - name: workload-gptoss-0
          image: docker.io/vllm/vllm-openai:v0.19.0@sha256:d9a5c1c1614c959fde8d2a4d68449db184572528a6055afdd0caf1e66fb51504
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 5
          env:
            - name: VLLM_MAX_AUDIO_CLIP_FILESIZE_MB
              value: "50"
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          command:
            - /bin/bash
            - -ec
            - |
              cp /untrusted-vllm-patch/anthropic.patch /vllm-workspace/anthropic.patch
              if [ $(sha256sum /vllm-workspace/anthropic.patch | cut -d ' ' -f 1) != '10a9c7933b4920de274e563ceb35008aa20622685df52310a79c542ec3f5123c' ]; then echo anthropic.patch hash mismatch: $(sha256sum /vllm-workspace/anthropic.patch | cut -d ' ' -f 1); exit 1; fi
              patch --batch --fuzz=0 -p1 -d /usr/local/lib/python3.12/dist-packages < /vllm-workspace/anthropic.patch
              exec vllm serve "$@"
            - _
          args:
            - '/mnt/modelweights-gptoss-0'
            - '--host=0.0.0.0'
            - '--port=8000'
            - '--enable-prompt-tokens-details'
            - '--gpu-memory-utilization=0.1'
            - '--kv-cache-memory-bytes=9.5g'
            - '--max-num-seqs=256'
            - '--max-model-len=131072'
            - '--enable-auto-tool-choice'
            - '--tool-call-parser'
            - 'openai'
            - '--reasoning-parser'
            - 'openai_gptoss'
            - '--structured-outputs-config={"backend": "xgrammar", "disable_any_whitespace": true}'
            - '--prefix-caching-hash-algo=sha256'
            - '--served-model-name'
            - 'openai/gpt-oss-120b'
            - 'gpt-oss-120b'
          volumeMounts:
            - name: mount-dir
              mountPath: /mnt
              mountPropagation: HostToContainer
            - name: vllm-patch
              mountPath: /untrusted-vllm-patch
              readOnly: true
          resources:
            requests:
              memory: 64Gi
            limits:
              memory: 64Gi
              "nvidia.com/GH100_H100_PCIE": 1
        - name: inference-proxy-gptoss-0
          image: ghcr.io/edgelesssys/privatemode/inference-proxy:v1.38.0@sha256:a03d3f77bec0eea3cd1465798bf78c265d26111bae20e0cdd35e61a66d0c7107
          ports:
            - containerPort: 8085
            - containerPort: 8185
          args:
            - '--adapter-type=openai,anthropic'
            - '--workload-address=127.0.0.1'
            - '--listen-port=8085'
            - '--metrics-port=8185'
            - '--workload-port=8000'
            - '--secret-svc-address=secret-service-internal.continuum-c79d18.svc.cluster.local'
            - '--etcd-member-cert=/contrast/tls-config/certChain.pem'
            - '--etcd-member-key=/contrast/tls-config/key.pem'
            - '--etcd-ca=/contrast/tls-config/mesh-ca.pem'
            - '--workload-tasks=generate,tool_calling'
          volumeMounts:
            - name: inference-proxy-gptoss-0-tls-cert
              mountPath: /etc/tls
              readOnly: true
            - name: continuum-run
              mountPath: /var/run/continuum
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: workload-gptoss
      volumes:
        - name: privatemode-ca-cert
          secret:
            secretName: privatemode-ca-secret
            items:
              - key: ca.crt
                path: ca.crt
        - emptyDir:
            medium: Memory
          name: mount-dir
        - emptyDir:
            medium: Memory
          name: continuum-run
        - name: vllm-patch
          configMap:
            name: vllm-patch
        - name: inference-proxy-gptoss-0-tls-cert
          secret:
            secretName: inference-proxy-gptoss-0-tls-secret
        - name: modelweights-gptoss-0
          persistentVolumeClaim:
            claimName: gptoss
