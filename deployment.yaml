apiVersion: apps/v1
kind: Deployment
metadata:
  name: unstructured-api
  namespace: continuum-347e1b
  labels:
    app: unstructured-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unstructured-api
  template:
    metadata:
      labels:
        app: unstructured-api
        app.kubernetes.io/instance: '347e1b'
    spec:
      runtimeClassName: contrast-cc
      containers:
        - name: unstructured-api
          image: 'quay.io/unstructured-io/unstructured-api:0.1.3@sha256:e905a6995c9d2a77e5444fbcfba9a0db7f4e2565e467ca4b86982a7cf5ae09ba'
          command:
            - /bin/sh
            - -ec
            - |
              test -f logger_config.yaml
              cp /untrusted/logger_config.yaml .
              if [ $(sha256sum logger_config.yaml | cut -d ' ' -f 1) != '62b5acd1bff3662a27d27f4d263273447f596f2244bd35e92a450eb2247d79dd' ]; then
                echo "logger config hash mismatch: $(sha256sum logger_config.yaml | cut -d ' ' -f 1)"
                exit 1
              fi
              exec scripts/app-start.sh
          resources:
            requests:
              memory: "60Gi"
            limits:
              memory: "60Gi"
          volumeMounts:
            - name: unstructured-api-logging-config
              mountPath: /untrusted
              readOnly: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 1
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
        - name: inference-proxy
          image: ghcr.io/edgelesssys/privatemode/inference-proxy:v1.40.0@sha256:f8e758beb969c00885850ebc59549527f5550e716865609a0111ff6aeb250de1
          ports:
            - containerPort: 8085
          args:
            - --adapter-type=unstructured
            - --workload-address=127.0.0.1
            - --workload-port=8000
            - --secret-svc-address=secret-service-internal.continuum-347e1b.svc.cluster.local
            - '--etcd-member-cert=/contrast/tls-config/certChain.pem'
            - '--etcd-member-key=/contrast/tls-config/key.pem'
            - '--etcd-ca=/contrast/tls-config/mesh-ca.pem'
            - '--identity-cert-path=/var/run/secrets/identity/tls.crt'
            - '--identity-key-path=/var/run/secrets/identity/tls.key'
            - '--identity-ca-path=/var/run/secrets/identity/ca.crt'
          volumeMounts:
            - name: unstructured-api-identity
              mountPath: /var/run/secrets/identity
              readOnly: true
      volumes:
        - name: unstructured-api-identity
          secret:
            secretName: unstructured-api-identity-secret
        - name: unstructured-api-logging-config
          configMap:
            name: unstructured-api-logging-config
