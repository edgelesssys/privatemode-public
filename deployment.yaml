            - '--gpu-memory-utilization=0.1'
            - '--kv-cache-memory-bytes=5.2g'
            - '--max-num-seqs=256'
            - '--max-model-len=131072'
            - '--enable-auto-tool-choice'
            - '--tool-call-parser'
            - 'openai'
            - '--reasoning-parser'
            - 'openai_gptoss'
            - '--structured-outputs-config={"backend": "xgrammar", "disable_any_whitespace": true}'
            - '--prefix-caching-hash-algo=sha256'
            - '--served-model-name'
            - 'openai/gpt-oss-120b'
            - 'gpt-oss-120b'
          volumeMounts:
            - name: mount-dir
