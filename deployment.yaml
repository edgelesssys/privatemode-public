          labelSelector:
            matchLabels:
              app: workload-gptoss
      volumes:
        - name: privatemode-ca-cert
          secret:
            secretName: privatemode-ca-secret
            items:
              - key: ca.crt
                path: ca.crt
        - emptyDir: {}
          name: mount-dir
        - emptyDir: {}
          name: continuum-run
        - name: vllm-patch
          configMap:
            name: vllm-patch
        - name: inference-proxy-gptoss-0-tls-cert
          secret:
            secretName: inference-proxy-gptoss-0-tls-secret
        - name: modelweights-gptoss-0
          ephemeral:
            volumeClaimTemplate:
              metadata: {}
              spec:
                storageClassName: openai-gpt-oss-120b-reproducible
                volumeMode: Block
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 67Gi
