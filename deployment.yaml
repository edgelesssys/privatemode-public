        - name: inference-proxy-gptoss-0
          image: ghcr.io/edgelesssys/privatemode/inference-proxy:v1.35.1@sha256:50c2fd6ba45272492d3708aab8618ab7742572d6adaf81620fdfa0d02c658c14
          ports:
            - containerPort: 8085
            - containerPort: 8185
          args:
            - '--adapter-type=openai,anthropic'
            - '--workload-address=127.0.0.1'
            - '--listen-port=8085'
            - '--metrics-port=8185'
            - '--workload-port=8000'
            - '--secret-svc-address=secret-service-internal.continuum-68e571.svc.cluster.local'
            - '--etcd-member-cert=/contrast/tls-config/certChain.pem'
            - '--etcd-member-key=/contrast/tls-config/key.pem'
            - '--etcd-ca=/contrast/tls-config/mesh-ca.pem'
            - '--workload-tasks=generate,tool_calling'
          volumeMounts:
            - name: inference-proxy-gptoss-0-tls-cert
              mountPath: /etc/tls
              readOnly: true
            - name: continuum-run
