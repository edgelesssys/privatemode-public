            - '--kv-cache-memory-bytes=20g'
            - '--max-num-seqs=20'
            - '--enable-auto-tool-choice'
            - '--tool-call-parser'
            - 'mistral'
            - '--tokenizer-mode'
            - 'mistral'
            - '--no-enable-prefix-caching'
            - '--served-model-name'
            - 'voxtral-mini-3b'
          volumeMounts:
            - name: mount-dir
              mountPath: /mnt
              mountPropagation: HostToContainer
            - name: vllm-audio-pylock
              mountPath: /untrusted-pylock
              readOnly: true
            - name: vllm-patch
              mountPath: /untrusted-vllm-patch
              readOnly: true
          resources:
            requests:
              memory: 70Gi
            limits:
              memory: 70Gi
              "nvidia.com/GH100_H100_PCIE": 1
        - name: inference-proxy-voxtralmini-0
          image: ghcr.io/edgelesssys/privatemode/inference-proxy:v1.35.1@sha256:50c2fd6ba45272492d3708aab8618ab7742572d6adaf81620fdfa0d02c658c14
          ports:
