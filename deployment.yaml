apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-gptoss
  namespace: continuum-68e571
  labels:
    app: workload-gptoss
    app.kubernetes.io/instance: '68e571'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-gptoss
  template:
